<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Infra Call Directory</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;
  --border:#e0dfd8;--border2:#c8c7c0;
  --purple50:#EEEDFE;--purple800:#3C3489;
  --teal50:#E1F5EE;--teal800:#085041;
  --gray50:#F1EFE8;--gray800:#2C2C2A;
  --coral50:#FAECE7;--coral800:#712B13;
  --pink50:#FBEAF0;--pink800:#72243E;
  --amber50:#FAEEDA;--amber800:#633806;
  --radius:10px;--radius-sm:6px;
  --header-h:auto;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1e1e1c;--bg2:#252523;--bg3:#2c2c2a;
    --text:#f0f0ea;--text2:#a0a09a;--text3:#606058;
    --border:#3a3a36;--border2:#4a4a46;
    --purple50:#26215C;--purple800:#CECBF6;
    --teal50:#04342C;--teal800:#9FE1CB;
    --gray50:#2C2C2A;--gray800:#D3D1C7;
    --coral50:#4A1B0C;--coral800:#F0997B;
    --pink50:#4B1528;--pink800:#ED93B1;
    --amber50:#412402;--amber800:#FAC775;
  }
}

/* ── Base ── */
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}

/* ── Header ── */
header{
  background:var(--bg);border-bottom:1px solid var(--border);
  padding:12px 16px;position:sticky;top:0;z-index:100;
  display:flex;gap:8px;flex-wrap:wrap;align-items:center;
}
.logo{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;margin-right:4px}
.logo span{color:var(--purple800);font-weight:400}

/* Search grows to fill, selects stay compact */
.header-search{
  flex:1 1 140px;min-width:120px;max-width:320px;
  padding:8px 12px;border:1px solid var(--border2);
  border-radius:var(--radius-sm);background:var(--bg2);
  color:var(--text);font-size:14px;
}
.header-search:focus{outline:2px solid var(--purple800);outline-offset:1px}

.header-sel{
  flex:0 1 auto;
  padding:8px 10px;border:1px solid var(--border2);
  border-radius:var(--radius-sm);background:var(--bg2);
  color:var(--text);font-size:13px;cursor:pointer;
  min-width:0;max-width:150px;
}

/* On very small phones, stack search + selects */
@media(max-width:400px){
  header{padding:10px 12px;gap:6px}
  .logo{width:100%;margin-bottom:2px}
  .header-search{max-width:100%;flex:1 1 100%}
  .header-sel{flex:1 1 calc(50% - 3px)}
}

/* ── Sub-bars ── */
.count-bar{padding:6px 16px;font-size:12px;color:var(--text3);background:var(--bg2);border-bottom:1px solid var(--border)}
.filters{
  padding:8px 16px;display:flex;gap:6px;flex-wrap:wrap;
  background:var(--bg2);border-bottom:1px solid var(--border);
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none}
.fb{
  padding:5px 12px;border:1px solid var(--border2);border-radius:20px;
  background:transparent;cursor:pointer;font-size:12px;color:var(--text2);
  white-space:nowrap;flex-shrink:0;touch-action:manipulation;
}
.fb:hover{background:var(--bg3)}
.fb.active{background:var(--purple800);color:#fff;border-color:var(--purple800)}

/* ── Main content ── */
.main{padding:12px 16px;max-width:1200px;margin:0 auto}
@media(min-width:600px){.main{padding:16px 20px}}
@media(min-width:900px){.main{padding:20px 28px}}

/* ── Tree: head node ── */
.tree-section{margin-bottom:16px}
.head-node{
  display:flex;align-items:center;gap:10px;
  background:var(--bg);border:1.5px solid var(--border2);
  border-left:4px solid var(--purple800);border-radius:var(--radius);
  padding:11px 14px;margin-bottom:2px;cursor:pointer;
  transition:box-shadow .15s;
}
.head-node:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.head-av{
  width:40px;height:40px;border-radius:50%;
  background:var(--purple50);color:var(--purple800);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;flex-shrink:0;
}
.head-info{flex:1;min-width:0}
.head-name{font-size:14px;font-weight:600;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.head-nick{font-size:12px;color:var(--text2)}
.head-phone{font-size:13px;font-family:monospace;color:var(--text);margin-top:2px}
.head-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* On small screens, hide "โทร / Line" text, show only emoji */
.btn-call{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 12px;background:var(--teal50);border:1px solid var(--border);
  border-radius:var(--radius-sm);font-size:12px;color:var(--teal800);
  text-decoration:none;white-space:nowrap;
}
.btn-line{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 12px;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-sm);font-size:12px;color:var(--text2);
  text-decoration:none;white-space:nowrap;
}
.btn-call:hover,.btn-line:hover{filter:brightness(.95)}
.btn-label{display:inline}

@media(max-width:480px){
  .btn-call,.btn-line{padding:6px 8px}
  .btn-label{display:none}
}

/* ── Tree: children / mid ── */
.children{display:none;padding-left:16px;border-left:2px dashed var(--border2);margin-left:14px;margin-bottom:12px}
.children.open{display:block}
@media(min-width:600px){
  .children{padding-left:24px;margin-left:18px}
}

.mid-node{
  display:flex;align-items:center;gap:10px;
  background:var(--bg);border:1px solid var(--border);
  border-left:3px solid var(--teal800);border-radius:var(--radius);
  padding:9px 12px;margin:6px 0 2px;cursor:pointer;
}
.mid-node:hover{border-color:var(--border2)}
.mid-av{
  width:34px;height:34px;border-radius:50%;
  background:var(--teal50);color:var(--teal800);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;flex-shrink:0;
}
.mid-info{flex:1;min-width:0}
.mid-name{font-size:13px;font-weight:500;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mid-nick{font-size:11px;color:var(--text2)}
.mid-phone{font-size:12px;font-family:monospace;color:var(--text);margin-top:1px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Leaf grid ── */
.leaf-list{display:none;padding-left:14px;border-left:2px dashed var(--border);margin-left:12px;margin-bottom:8px}
.leaf-list.open{display:block}
.leaf-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:6px;padding:6px 0;
}
@media(min-width:400px){.leaf-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:700px){.leaf-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}
@media(min-width:1000px){.leaf-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}}

.leaf-card{
  background:var(--bg);border:0.5px solid var(--border);
  border-left:2px solid var(--border2);border-radius:var(--radius-sm);
  padding:9px 12px;
}
.leaf-name{font-size:12px;font-weight:500;color:var(--text)}
.leaf-nick{font-size:11px;color:var(--text2);margin-bottom:4px}
.leaf-phone{font-size:12px;font-family:monospace;color:var(--text)}
.leaf-btns{display:flex;gap:5px;margin-top:6px}
.leaf-btns a{
  display:inline-flex;align-items:center;gap:3px;
  padding:4px 9px;border:0.5px solid var(--border2);border-radius:4px;
  font-size:11px;color:var(--text2);text-decoration:none;background:var(--bg2);
}
.leaf-btns a:hover{background:var(--bg3)}

/* ── Flat grid ── */
.flat-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
}
@media(min-width:400px){.flat-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:700px){.flat-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}
@media(min-width:1000px){.flat-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}}

.flat-card{
  background:var(--bg);border:0.5px solid var(--border);
  border-radius:var(--radius);padding:12px 14px;
}
.flat-card.seq1{border-left:3px solid var(--purple800)}
.flat-card.seq2{border-left:3px solid #1D9E75}
.flat-card.seq3{border-left:3px solid #888780}
.flat-card.seq4{border-left:3px solid #D85A30}
.flat-card.seq5,.flat-card.seq6,.flat-card.seq7,.flat-card.seq8{border-left:3px solid #D4537E}
.flat-av{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;margin-bottom:8px;
}
.av-1{background:var(--purple50);color:var(--purple800)}
.av-2{background:var(--teal50);color:var(--teal800)}
.av-3{background:var(--gray50);color:var(--gray800)}
.av-4{background:var(--coral50);color:var(--coral800)}
.av-5{background:var(--pink50);color:var(--pink800)}
.f-name{font-size:13px;font-weight:500;color:var(--text)}
.f-nick{font-size:11px;color:var(--text2);margin-bottom:2px}
.f-head{font-size:11px;color:var(--text3);margin-bottom:5px}
.f-sec{font-size:11px;color:var(--text2);margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.f-phone{font-size:12px;font-family:monospace;color:var(--text)}
.f-btns{display:flex;gap:5px;margin-top:7px}
.f-btns a{
  display:inline-flex;align-items:center;gap:3px;
  padding:4px 10px;border:0.5px solid var(--border2);
  border-radius:var(--radius-sm);font-size:11px;color:var(--text2);
  text-decoration:none;background:var(--bg2);
}
.f-btns a:hover{background:var(--bg3)}

/* ── Misc ── */
.no-r{text-align:center;padding:3rem;color:var(--text3);font-size:14px}
.toggle-icon{font-size:12px;color:var(--text3);transition:transform .2s;margin-left:4px;flex-shrink:0}
.rotated{transform:rotate(90deg)}

/* Tap targets — at least 44px on mobile */
@media(max-width:600px){
  .head-node,.mid-node{min-height:52px}
  .fb{min-height:34px;display:inline-flex;align-items:center}
}

/* Large screens: cap the header search */
@media(min-width:900px){
  .header-search{max-width:360px}
}
</style>

// Build name->person map
const byName={};
people.forEach(p=>byName[p.name.split(" ")[0]]=p);

// Find col2 nodes (direct reports of Sutkitrat = seq 2-9 level or specific)
// Tree: Sutkitrat -> [Pitchapa,Prasood,Gaitong,Athiwat,Anek,Thirapon,Anan,Puchong]
// Each col2 node -> their direct reports -> their reports
const col2Names=["Pitchapa","Prasood","Gaitong","Athiwat","Anek","Thirapon","Anan","Puchong"];

function firstWord(n){return n.split(" ")[0]}
function ini(n){const p=n.split(" ");return(p[0]?p[0][0]:"")+(p[1]?p[1][0]:"")}
function tel(p){return p.replace(/[- ]/g,"")}

let currentView="tree";
let activeSection="ทั้งหมด";
let allSections=["ทั้งหมด",...[...new Set(people.map(p=>p.section))].sort()];

// Populate head filter
const headSel=document.getElementById("headSel");
col2Names.forEach(n=>{
  const p=people.find(x=>firstWord(x.name)===n);
  if(!p)return;
  const o=document.createElement("option");
  o.value=firstWord(p.name);
  o.textContent=`${p.nick} (${firstWord(p.name)})`;
  headSel.appendChild(o);
});

// Filters
function initFilters(){
  const el=document.getElementById("filters");
  el.innerHTML="";
  allSections.forEach(s=>{
    const b=document.createElement("button");
    b.className="fb"+(s===activeSection?" active":"");
    b.textContent=s==="ทั้งหมด"?"ทั้งหมด":s.replace(/^Infra /,"").replace(/ (Unit|Section|unit)$/,"");
    b.title=s;
    b.onclick=()=>{activeSection=s;document.querySelectorAll(".fb").forEach(x=>x.classList.remove("active"));b.classList.add("active");render()};
    el.appendChild(b);
  });
}

function switchView(){
  currentView=document.getElementById("viewSel").value;
  render();
}

function btnPair(p,small=false){
  const t=tel(p.phone);
  const lineUrl="https://line.me/ti/p/~"+encodeURIComponent(p.lineId);
  const sz=small?"font-size:11px;padding:3px 8px":"font-size:12px;padding:5px 12px";
  return `<a class="btn-call" href="tel:${t}" style="${sz}">📞 <span class="btn-label">โทร</span></a>
          <a class="btn-line" href="${lineUrl}" target="_blank" style="${sz}">💬 <span class="btn-label">Line</span></a>`;
}

function leafCard(p){
  return`<div class="leaf-card">
    <div class="leaf-name">${p.name}</div>
    <div class="leaf-nick">ชื่อเล่น: ${p.nick}</div>
    <div class="leaf-phone">${p.phone}</div>
    <div style="font-size:10px;color:var(--text3);margin-top:2px">Line: ${p.lineId}</div>
    <div class="leaf-btns">${btnPair(p,true)}</div>
  </div>`;
}

function midNodeHTML(p,id,children){
  const childCount=children.length;
  return`<div class="mid-node" onclick="toggleSection('${id}')">
    <div class="mid-av">${ini(p.name)}</div>
    <div class="mid-info">
      <div class="mid-name">${p.name} <span style="font-size:11px;color:var(--text3)">(${p.nick})</span></div>
      <div class="mid-nick">${p.section.replace("Infra ","")}</div>
      <div class="mid-phone">${p.phone} · Line: ${p.lineId}</div>
    </div>
    <div class="head-actions">
      ${btnPair(p,true)}
      ${childCount>0?`<span class="toggle-icon" id="icon-${id}">▶ ${childCount}</span>`:""}
    </div>
  </div>
  <div class="leaf-list" id="sec-${id}">
    <div class="leaf-grid">${children.map(c=>leafCard(c)).join("")}</div>
  </div>`;
}

function toggleSection(id){
  const el=document.getElementById("sec-"+id);
  const ic=document.getElementById("icon-"+id);
  if(!el)return;
  el.classList.toggle("open");
  if(ic)ic.classList.toggle("rotated");
}

function toggleHead(id){
  const el=document.getElementById("ch-"+id);
  const ic=document.getElementById("hic-"+id);
  if(!el)return;
  el.classList.toggle("open");
  if(ic)ic.classList.toggle("rotated");
}

function renderTree(){
  const headFilter=document.getElementById("headSel").value;
  const q=document.getElementById("q").value.toLowerCase().trim();

  // If searching, go flat
  if(q){renderFlat();return;}

  let col2List=col2Names.map(n=>people.find(x=>firstWord(x.name)===n)).filter(Boolean);
  if(headFilter) col2List=col2List.filter(p=>firstWord(p.name)===headFilter);

  let html="";
  let totalShown=0;

  col2List.forEach((headP,hi)=>{
    const hfn=firstWord(headP.name);
    // direct reports of this col2
    const col3=people.filter(p=>firstWord(p.head)===hfn && activeSection==="ทั้งหมด" ? true : p.section===activeSection || p.name===headP.name);
    const col3all=people.filter(p=>firstWord(p.head)===hfn);

    // Count all under this head
    const allUnder=people.filter(p=>{
      let cur=p;
      for(let i=0;i<5;i++){
        if(firstWord(cur.head)===hfn)return true;
        const par=people.find(x=>firstWord(x.name)===cur.head);
        if(!par)break;
        cur=par;
      }
      return false;
    });

    if(headFilter && allUnder.length===0 && col3all.length===0)return;
    totalShown++;

    const hid="h"+hi;
    html+=`<div class="tree-section">
      <div class="head-node" onclick="toggleHead('${hid}')">
        <div class="head-av">${ini(headP.name)}</div>
        <div class="head-info">
          <div class="head-name">${headP.name} <span style="font-size:11px;color:var(--text2)">(${headP.nick})</span></div>
          <div class="head-nick" style="font-size:11px;color:var(--text2);margin-top:1px">${headP.section.replace("Infra ","")}</div>
          <div class="head-phone">${headP.phone}</div>
        </div>
        <div class="head-actions">
          ${btnPair(headP)}
          <span class="toggle-icon" id="hic-${hid}">▶ ${allUnder.length} คน</span>
        </div>
      </div>
      <div class="children" id="ch-${hid}">`;

    // col3 nodes
    col3all.forEach((midP,mi)=>{
      const mfn=firstWord(midP.name);
      const leaves=people.filter(p=>firstWord(p.head)===mfn);
      const mid2=leaves.filter(l=>{
        const l2=people.filter(p=>firstWord(p.head)===firstWord(l.name));
        return l2.length>0;
      });
      // flat leaves
      const directLeaves=leaves.filter(l=>people.filter(p=>firstWord(p.head)===firstWord(l.name)).length===0);

      if(leaves.length===0){
        // leaf mid node
        html+=`<div style="padding:4px 0">${midNodeHTML(midP,"m"+hi+"_"+mi,[])}</div>`;
      } else {
        // mid has children — show as expandable mid with sub-mids
        html+=`<div class="mid-node" onclick="toggleSection('sm${hi}_${mi}')">
          <div class="mid-av">${ini(midP.name)}</div>
          <div class="mid-info">
            <div class="mid-name">${midP.name} <span style="font-size:11px;color:var(--text3)">(${midP.nick})</span></div>
            <div class="mid-nick">${midP.section.replace("Infra ","")}</div>
            <div class="mid-phone">${midP.phone} · Line: ${midP.lineId}</div>
          </div>
          <div class="head-actions">
            ${btnPair(midP,true)}
            <span class="toggle-icon" id="icon-sm${hi}_${mi}">▶ ${leaves.length}</span>
          </div>
        </div>
        <div class="leaf-list" id="sec-sm${hi}_${mi}" style="padding-left:16px;border-left:2px dashed var(--border);margin-left:12px">`;

        // sub-mids
        leaves.forEach((subP,si)=>{
          const subLeaves=people.filter(p=>firstWord(p.head)===firstWord(subP.name));
          html+=midNodeHTML(subP,"sub"+hi+"_"+mi+"_"+si,subLeaves);
        });
        html+=`</div>`;
      }
    });

    html+=`</div></div>`;
  });

  document.getElementById("main").innerHTML=html||`<div class="no-r">ไม่พบข้อมูล</div>`;
  document.getElementById("countBar").textContent=`แสดง ${col2List.length} หน่วย · ${people.length} คนทั้งหมด`;
}

function renderFlat(){
  const q=document.getElementById("q").value.toLowerCase().trim();
  const headFilter=document.getElementById("headSel").value;

  const filtered=people.filter(p=>{
    const mSec=activeSection==="ทั้งหมด"||p.section===activeSection;
    const mHead=!headFilter||firstWord(p.head)===headFilter||firstWord(p.name)===headFilter;
    const mQ=!q||p.name.toLowerCase().includes(q)||p.nick.toLowerCase().includes(q)||p.phone.replace(/-/g,"").includes(q.replace(/-/g,""))||p.lineId.toLowerCase().includes(q);
    return mSec&&mHead&&mQ;
  });

  document.getElementById("countBar").textContent=`แสดง ${filtered.length} จาก ${people.length} คน`;
  if(!filtered.length){document.getElementById("main").innerHTML=`<div class="no-r">ไม่พบผลลัพธ์</div>`;return;}

  const avCls=["av-1","av-2","av-3","av-4","av-5"];
  const html=`<div class="flat-grid">${filtered.map(p=>{
    const av=avCls[Math.min(p.seq-1,4)];
    const t=tel(p.phone);
    const lineUrl="https://line.me/ti/p/~"+encodeURIComponent(p.lineId);
    return`<div class="flat-card seq${p.seq}">
      <div class="flat-av ${av}">${ini(p.name)}</div>
      <div class="f-name">${p.name}</div>
      <div class="f-nick">ชื่อเล่น: ${p.nick}</div>
      <div class="f-head">Head: ${p.head}</div>
      <div class="f-sec" title="${p.section}">${p.section.replace("Infra ","")}</div>
      <div class="f-phone">${p.phone}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">Line: ${p.lineId}</div>
      <div class="f-btns">
        <a href="tel:${t}">📞 โทร</a>
        <a href="${lineUrl}" target="_blank">💬 Line</a>
      </div>
    </div>`;
  }).join("")}</div>`;
  document.getElementById("main").innerHTML=html;
}

function render(){
  if(currentView==="tree") renderTree();
  else renderFlat();
}

document.getElementById("q").addEventListener("input",()=>{
  if(currentView==="tree" && document.getElementById("q").value){
    renderFlat();
  } else render();
});

initFilters();
render();
</script>
